<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="screen">
            <p id="screen_text"></p>
        </div>
        <div id="input">
            
                <button class="input_button" id="one" >1</button>
                <button class="input_button" id="two">2</button>
                <button class="input_button" id="three">3</button>
                <button class="oper_button" id="plus">+</button>
                <button class="oper_button" id="minus">-</button>
                <button class="input_button" id="four">4</button>
                <button class="input_button" id="five">5</button>
                <button class="input_button" id="six">6</button>
                <button class="oper_button" id="multiply">x</button>
                <button class="oper_button" id="divide">/</button>
                <button class="input_button" id="seven">7</button>
                <button class="input_button" id="eight">8</button>
                <button class="input_button" id="nine">9</button>
                <button class="oper_button" id="erase">Erase</button>
                <button class="oper_button" id="clear_all">Clear All</button>
                <button class="input_button" id="zero">0</button>
                <button class="input_button" id="double_zero">00</button>
                <button class="input_button" id="point">.</button>
                <button class="input_button" id="equals_to">=</button>
           
            
        </div>
    </div>
</body>
</html>
